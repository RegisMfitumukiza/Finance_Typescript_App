<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Finance App</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <main class="auth-page">

    <section class="auth-hero">
      <div class="auth-hero__content">

        <h1 class="brand">finance</h1>

        <img
          src="/images/illustration.webp"
          alt="Finance Illustration"
          class="auth-hero__image"
        />

        <div class="auth-hero__text">
          <h2>Keep track of your money and save for your future</h2>

          <p>
            Personal finance app puts you in control of your spending.
            Track transactions, set budgets, and add to savings pots easily.
          </p>
        </div>

      </div>
    </section>

    <section class="auth-section">

      <div id="auth-container" class="auth-container">
        <div class="auth-card">
          <h2 class="auth-card__title">Loading...</h2>
        </div>
      </div>
    </section>

  </main>

  <script type="module" src="/dist/app.js"></script>
</body>
</html>
